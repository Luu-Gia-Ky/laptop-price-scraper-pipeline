version: '3.9'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper

    ports:
      - "9092:9092"
      - "29092:29092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped

    ports:
      - "3306:3306"

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laptop_db
      MYSQL_USER: laptop_user
      MYSQL_PASSWORD: laptop_pass

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - app-network

  laravel-app:
    build:
      context: ./laravel-scraper

    container_name: laravel-app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ./laravel-app:/var/www

    ports:
      - "8000:8000"

    depends_on:
      - kafka

    environment:
      KAFKA_BROKER: kafka:9092

    networks:
      - app-network

  springboot-app:
    build:
      context: ./springboot-processor

    container_name: springboot-app

    restart: unless-stopped

    ports:
      - "8080:8080"

    depends_on:
      - kafka
      - mysql

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/laptop_db
      SPRING_DATASOURCE_USERNAME: laptop_user
      SPRING_DATASOURCE_PASSWORD: laptop_pass

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data: